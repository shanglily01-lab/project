# ProjectX — API / WebSocket 反代片段
# 在已有 server { } 内加入:  include /etc/nginx/conf.d/projectx-api.conf;
# 前端静态文件需另配 root 或单独 server，见 deploy/aws-linux/README.md

location /socket.io/ {
    proxy_pass http://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}

location ~ ^/(api|data|scoring|ai|actions)(/|$) {
    proxy_pass http://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
