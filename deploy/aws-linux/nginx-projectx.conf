# ProjectX — 独立站点（非 default_server，避免覆盖已有 :80 配置）
# 默认监听 __NGINX_HTTP_PORT__，由 deploy.sh 渲染
server {
    listen __NGINX_HTTP_PORT__;
    listen [::]:__NGINX_HTTP_PORT__;
    server_name _;

    root __INSTALL_DIR__/frontend/dist;
    index index.html;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    include /etc/nginx/snippets/projectx-api.conf;
}
